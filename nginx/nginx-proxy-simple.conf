# Simplified Nginx Proxy Manager Configuration
# Add this to the "Advanced" tab in your Stocky Backend proxy host

# Prevent mixed content by ensuring all redirects use HTTPS
proxy_redirect http:// https://;

# Security headers to prevent mixed content issues
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "upgrade-insecure-requests" always;

# URL normalization for API endpoints
# Collection endpoints: add trailing slash if missing
location ~ ^/api/v1/(users|items|locations|skus|alerts|logs|shopping-lists)$ {
    return 301 https://$host$uri/$is_args$args;
}

# Resource endpoints: remove trailing slash if present
location ~ ^/api/v1/(users|items|locations|skus|shopping-lists)/([0-9]+)/$ {
    return 301 https://$host/api/v1/$1/$2$is_args$args;
}

# Auth endpoints: remove trailing slash if present
location ~ ^/api/v1/auth/([^/]+)/$ {
    return 301 https://$host/api/v1/auth/$1$is_args$args;
}

# Multi-part endpoints: remove trailing slash if present
location ~ ^/api/v1/(.*[^/])/$ {
    return 301 https://$host/api/v1/$1$is_args$args;
}