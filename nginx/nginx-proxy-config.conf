# Nginx Proxy Manager Configuration for Stocky Backend
# This configuration prevents redirect issues and ensures proper URL handling

# Custom location blocks to add in Nginx Proxy Manager Advanced tab

# 1. Collection endpoints - ensure trailing slash
location ~ ^/api/v1/(users|items|locations|skus|alerts|logs|shopping-lists)$ {
    # Redirect to trailing slash version
    return 301 $scheme://$host$uri/;
}

# 2. Resource endpoints - remove trailing slash if present
location ~ ^/api/v1/(users|items|locations|skus|shopping-lists)/([^/]+)/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host/api/v1/$1/$2;
}

# 3. Multi-part paths - remove trailing slash if present
location ~ ^/api/v1/(skus/[^/]+/quantity|alerts/[^/]+/acknowledge|shopping-lists/[^/]+/(duplicate|items|logs))/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host$uri;
}

# 4. Shopping list item endpoints - remove trailing slash if present  
location ~ ^/api/v1/shopping-lists/[^/]+/items/[^/]+/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host$uri;
}

# 5. Auth endpoints - remove trailing slash if present
location ~ ^/api/v1/auth/(login|refresh|logout|me|generate-api-key|revoke-api-key)/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host/api/v1/auth/$1;
}

# 6. Scanner endpoints - remove trailing slash if present
location ~ ^/api/v1/scanner/(scan|activity)/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host/api/v1/scanner/$1;
}

# 7. Backup endpoints - remove trailing slash if present
location ~ ^/api/v1/backup/(create/full|create/full/download|import/partial|import/full|upload/import/partial|upload/import/full)/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host$uri;
}

# 8. Health endpoint - remove trailing slash if present
location ~ ^/api/v1/health/$ {
    # Redirect to non-trailing slash version
    return 301 $scheme://$host/api/v1/health;
}

# Additional security headers to prevent mixed content issues
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "upgrade-insecure-requests" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;

# Ensure all redirects preserve the original scheme
proxy_redirect http:// $scheme://;
proxy_redirect https:// $scheme://;