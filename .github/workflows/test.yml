name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Ensure minimal permissions
permissions:
  contents: read
  checks: write
  pull-requests: write

# Cancel in-progress runs for the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  CI: true

jobs:
  unit-and-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run unit tests
      run: npm run test:unit
    
    - name: Run integration tests
      run: npm run test:integration
    
    - name: Generate test coverage
      run: npm run test:coverage
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: matrix.node-version == '20.x'
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/
        retention-days: 30
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.node-version == '20.x'
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npm run test:setup
    
    - name: Build application
      run: npm run build
    
    - name: Run Playwright E2E tests
      run: npm run test:e2e
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ github.run_id }}
        path: playwright-report/
        retention-days: 30
        if-no-files-found: ignore
    
    - name: Upload test results
      uses: actions/upload-artifact@v4  
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: test-results/
        retention-days: 30
        if-no-files-found: ignore

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Test TypeScript compilation
      run: npx tsc --noEmit
    
    - name: Test production build
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: matrix.node-version == '20.x'
      with:
        name: build-artifacts-${{ github.run_id }}
        path: dist/
        retention-days: 7
    
    - name: Test Docker build
      if: matrix.node-version == '20.x'
      run: |
        docker build -t stocky-web:test .
        docker run --rm stocky-web:test nginx -t
    
    - name: Test Docker multi-stage build
      if: matrix.node-version == '20.x'
      run: |
        docker build --target builder -t stocky-web:builder .
        docker build --target runtime -t stocky-web:runtime .

  # Summary job that depends on all test jobs
  test-summary:
    runs-on: ubuntu-latest
    needs: [unit-and-integration-tests, e2e-tests, build-test]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "Unit and Integration Tests: ${{ needs.unit-and-integration-tests.result }}"
        echo "E2E Tests: ${{ needs.e2e-tests.result }}"
        echo "Build Tests: ${{ needs.build-test.result }}"
        
        if [[ "${{ needs.unit-and-integration-tests.result }}" == "failure" || 
              "${{ needs.e2e-tests.result }}" == "failure" || 
              "${{ needs.build-test.result }}" == "failure" ]]; then
          echo "❌ Some tests failed"
          exit 1
        else
          echo "✅ All tests passed"
        fi
